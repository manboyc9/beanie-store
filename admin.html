<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — Knit&Co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2;
      --dark: #1C1814;
      --warm: #8B5E3C;
      --accent: #D4A574;
      --light: #F0E8DC;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); overflow-x: hidden; }

    /* NAV */
    .nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2.5rem; border-bottom: 1px solid rgba(139,94,60,0.2); background: var(--cream); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--dark); letter-spacing: -0.5px; text-decoration: none;}
    .logo span { color: var(--warm); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--dark); text-decoration: none; opacity: 0.7; transition: opacity 0.2s; }
    .nav-links a:hover { opacity: 1; }
    .nav-links a[href="admin.html"] { color: var(--warm) !important; font-weight: 700; opacity: 1; }
    .cart-btn { background: var(--dark); color: var(--cream); border: none; padding: 0.5rem 1.2rem; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
    .cart-btn:hover { background: var(--warm); }
    .cart-count { background: var(--warm); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: inline-flex; align-items: center; justify-content: center; margin-left: 4px; font-weight: 700; }

    /* ADMIN SPECIFIC */
    .admin-container { padding: 4rem 2.5rem; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1.2fr 1fr; gap: 3rem; align-items: start; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; color: var(--dark); margin-bottom: 2rem; }
    
    .admin-card { background: white; padding: 2rem; border-radius: 20px; border: 1px solid rgba(139,94,60,0.1); box-shadow: 0 10px 30px rgba(139,94,60,0.05); }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 0.5rem; color: rgba(28,24,20,0.7); }
    .form-group input, .form-group textarea { width: 100%; padding: 0.8rem 1rem; border: 1px solid rgba(28,24,20,0.2); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--cream); color: var(--dark); outline: none; transition: border-color 0.2s; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--warm); }
    .form-group textarea { resize: vertical; min-height: 100px; }
    
    /* Image Preview */
    .image-preview-box { width: 100%; height: 150px; border: 2px dashed rgba(28,24,20,0.2); border-radius: 8px; margin-top: 0.5rem; display: flex; align-items: center; justify-content: center; background: var(--cream); overflow: hidden; }
    .image-preview-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .image-preview-box span { font-size: 13px; color: rgba(28,24,20,0.5); }

    /* Color Picker */
    .color-picker-wrap { display: flex; gap: 0.5rem; align-items: center; }
    .color-picker-wrap input[type="color"] { width: 40px; height: 40px; padding: 0; border: none; border-radius: 8px; cursor: pointer; background: transparent; }
    .color-picker-wrap input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    .color-picker-wrap input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(28,24,20,0.2); border-radius: 8px; }
    .btn-add-color { background: var(--warm); color: white; border: none; padding: 0 1rem; height: 40px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; }
    
    .color-badges { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.8rem; }
    .color-badge { display: flex; align-items: center; gap: 0.5rem; background: var(--light); padding: 0.3rem 0.6rem; border-radius: 20px; font-size: 12px; border: 1px solid rgba(28,24,20,0.1); }
    .color-swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; }
    .remove-color { cursor: pointer; color: #C0392B; font-weight: bold; }

    .btn-primary { background: var(--dark); color: var(--cream); border: none; padding: 0.85rem 2rem; border-radius: 30px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; width: 100%; }
    .btn-primary:hover { background: var(--warm); transform: translateY(-1px); }

    .btn-secondary { background: transparent; color: var(--dark); border: 1.5px solid rgba(28,24,20,0.3); padding: 0.85rem 2rem; border-radius: 30px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; width: 100%; margin-top: 0.5rem; display: none;}
    .btn-secondary:hover { border-color: var(--warm); color: var(--warm); }

    .product-list { display: flex; flex-direction: column; gap: 1rem; }
    .admin-product-item { display: flex; align-items: center; gap: 1rem; background: var(--cream); padding: 1rem; border-radius: 12px; border: 1px solid rgba(139,94,60,0.1); }
    .admin-product-img { width: 60px; height: 60px; background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .admin-product-img img { width: 100%; height: 100%; object-fit: contain; }
    .admin-product-info { flex: 1; }
    .admin-product-name { font-weight: 500; font-size: 15px; }
    .admin-product-price { font-size: 13px; color: var(--warm); margin-top: 0.2rem; }
    .admin-product-stock { font-size: 12px; color: rgba(28,24,20,0.5); margin-top: 0.2rem; }
    
    .action-btns { display: flex; gap: 0.5rem; }
    .btn-icon { background: none; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: color 0.2s;}
    .btn-edit { color: var(--warm); }
    .btn-edit:hover { color: var(--dark); }
    .btn-delete { color: #C0392B; }
    .btn-delete:hover { color: #922b21; }

    /* TOAST */
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--dark); color: var(--cream); padding: 1rem 1.5rem; border-radius: 12px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 900px) {
      .admin-container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<nav class="nav">
  <div style="display: flex; align-items: center;">
    <a href="index.html" class="logo">Knit<span>&amp;Co.</span></a>
  </div>
  <ul class="nav-links">
    <li><a href="index.html">Shop</a></li>
    <!-- Dynamic links injected here -->
  </ul>
  <button class="cart-btn" onclick="window.location.href='cart.html'">Cart <span class="cart-count" id="cartCount">0</span></button>
</nav>

<div class="admin-container">
  <!-- Add/Edit Product Form -->
  <div class="admin-card">
    <h2 class="section-title" id="formTitle">Add New Product</h2>
    <form id="addProductForm" onsubmit="saveProduct(event)">
      <div class="form-group">
        <label>Product Name</label>
        <input type="text" id="pName" required placeholder="e.g. Y2K satin lined-blue" />
      </div>
      <div class="form-group">
        <label>Category / Subtitle</label>
        <input type="text" id="pSub" required placeholder="e.g. Everyday Essential" />
      </div>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" id="pPrice" required min="0" placeholder="0" />
        </div>
        <div class="form-group">
          <label>Stock Amount</label>
          <input type="number" id="pAmount" required min="0" placeholder="0" />
        </div>
      </div>
      <div class="form-group">
        <label>Image Filename</label>
        <input type="text" id="pImage" required placeholder="e.g. product1.png" oninput="updateImagePreview()" />
        <div class="image-preview-box" id="imagePreviewBox">
          <span>No image selected</span>
        </div>
      </div>
      <div class="form-group">
        <label>Colors</label>
        <div class="color-picker-wrap">
          <input type="color" id="pColorPicker" value="#1C1814" />
          <button type="button" class="btn-add-color" onclick="addColor()">Add Color</button>
        </div>
        <div class="color-badges" id="colorBadges"></div>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="pDesc" required placeholder="Product description..."></textarea>
      </div>
      <button type="submit" class="btn-primary" id="btnSubmit">Save Product</button>
      <button type="button" class="btn-secondary" id="btnCancel" onclick="resetForm()">Cancel Edit</button>
    </form>
  </div>

  <!-- Dashboard -->
  <div class="admin-card">
    <h2 class="section-title">Current Products</h2>
    <div class="product-list" id="productList">
      <!-- Products dynamically loaded -->
    </div>
  </div>
</div>

<script>
  // Security Check
  if (localStorage.getItem('userRole') !== 'admin') {
    window.location.href = 'login.html';
  }

  let editingIndex = -1;
  let selectedColors = [];
  let cart = JSON.parse(localStorage.getItem('cart')) || [];

  function updateCartCount() {
    const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
    const countEl = document.getElementById('cartCount');
    if (countEl) countEl.textContent = totalQty;
  }
  updateCartCount();

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function updateImagePreview() {
    const box = document.getElementById('imagePreviewBox');
    const val = document.getElementById('pImage').value;
    if (val.trim() === '') {
      box.innerHTML = '<span>No image selected</span>';
    } else {
      box.innerHTML = `<img src="${val}" alt="Preview" onerror="this.parentElement.innerHTML='<span>Image not found</span>'" />`;
    }
  }

  function renderColors() {
    const container = document.getElementById('colorBadges');
    container.innerHTML = '';
    selectedColors.forEach((c, idx) => {
      container.innerHTML += `
        <div class="color-badge">
          <span class="color-swatch" style="background-color: ${c}"></span>
          ${c.toUpperCase()}
          <span class="remove-color" onclick="removeColor(${idx})">×</span>
        </div>
      `;
    });
  }

  function addColor() {
    const val = document.getElementById('pColorPicker').value;
    if (!selectedColors.includes(val)) {
      selectedColors.push(val);
      renderColors();
    }
  }

  function removeColor(idx) {
    selectedColors.splice(idx, 1);
    renderColors();
  }

  function loadProducts() {
    const products = JSON.parse(localStorage.getItem('products')) || [];
    const list = document.getElementById('productList');
    list.innerHTML = '';

    if (products.length === 0) {
      list.innerHTML = '<p style="color: rgba(28,24,20,0.5); font-size: 14px;">No products found.</p>';
      return;
    }

    products.forEach((p, i) => {
      list.innerHTML += `
        <div class="admin-product-item">
          <div class="admin-product-img">
            ${p.image ? `<img src="${p.image}" alt="${p.name}" />` : '👕'}
          </div>
          <div class="admin-product-info">
            <div class="admin-product-name">${p.name}</div>
            <div class="admin-product-price">$${p.price}.00</div>
            <div class="admin-product-stock">Stock: ${p.amount || 0}</div>
          </div>
          <div class="action-btns">
            <button class="btn-icon btn-edit" onclick="editProduct(${i})">Edit</button>
            <button class="btn-icon btn-delete" onclick="removeProduct(${i})">Delete</button>
          </div>
        </div>
      `;
    });
  }

  function saveProduct(e) {
    e.preventDefault();
    const name = document.getElementById('pName').value;
    const sub = document.getElementById('pSub').value;
    const price = parseInt(document.getElementById('pPrice').value);
    const amount = parseInt(document.getElementById('pAmount').value);
    const image = document.getElementById('pImage').value;
    const desc = document.getElementById('pDesc').value;

    if (selectedColors.length === 0) {
      alert("Please add at least one color.");
      return;
    }

    const productData = {
      name: name,
      sub: sub,
      price: price,
      amount: amount,
      image: image,
      colors: [...selectedColors],
      description: desc
    };

    let products = JSON.parse(localStorage.getItem('products')) || [];
    
    if (editingIndex > -1) {
      products[editingIndex] = productData;
      showToast('Product updated!');
    } else {
      products.push(productData);
      showToast('Product added!');
    }
    
    localStorage.setItem('products', JSON.stringify(products));
    resetForm();
    loadProducts();
  }

  function editProduct(index) {
    const products = JSON.parse(localStorage.getItem('products')) || [];
    const p = products[index];
    if (!p) return;

    editingIndex = index;
    document.getElementById('formTitle').textContent = 'Edit Product';
    document.getElementById('btnSubmit').textContent = 'Update Product';
    document.getElementById('btnCancel').style.display = 'block';

    document.getElementById('pName').value = p.name || '';
    document.getElementById('pSub').value = p.sub || '';
    document.getElementById('pPrice').value = p.price || '';
    document.getElementById('pAmount').value = p.amount || '';
    document.getElementById('pImage').value = p.image || '';
    document.getElementById('pDesc').value = p.description || '';

    selectedColors = p.colors ? [...p.colors] : [];
    renderColors();
    updateImagePreview();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetForm() {
    editingIndex = -1;
    document.getElementById('formTitle').textContent = 'Add New Product';
    document.getElementById('btnSubmit').textContent = 'Save Product';
    document.getElementById('btnCancel').style.display = 'none';
    document.getElementById('addProductForm').reset();
    selectedColors = [];
    renderColors();
    updateImagePreview();
  }

  function removeProduct(index) {
    if(confirm('Are you sure you want to remove this product?')) {
      const products = JSON.parse(localStorage.getItem('products')) || [];
      products.splice(index, 1);
      localStorage.setItem('products', JSON.stringify(products));
      showToast('Product removed!');
      loadProducts();
    }
  }

  function renderNav() {
    const role = localStorage.getItem('userRole');
    const navLinks = document.querySelector('.nav-links');
    
    const existingDynamic = document.querySelectorAll('.dynamic-link');
    existingDynamic.forEach(el => el.remove());

    if (role === 'admin') {
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="admin.html">Admin Dashboard</a></li>');
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="#" onclick="logout(event)">Logout</a></li>');
    } else if (role === 'customer') {
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="#">My Account</a></li>');
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="#" onclick="logout(event)">Logout</a></li>');
    } else {
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="login.html">Login</a></li>');
    }
  }

  function logout(e) {
    if(e) e.preventDefault();
    localStorage.removeItem('userRole');
    showToast('Logged out successfully.');
    window.location.href = 'login.html'; // Redirect from admin immediately
  }

  // Init
  loadProducts();
  renderNav();
</script>

</body>
</html>
