<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Knit&Co.</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #FAF7F2;
      --dark: #1C1814;
      --warm: #8B5E3C;
      --accent: #D4A574;
      --light: #F0E8DC;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--dark); overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }

    /* NAV */
    .nav { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 2.5rem; border-bottom: 1px solid rgba(139,94,60,0.2); background: var(--cream); position: sticky; top: 0; z-index: 100; }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--dark); letter-spacing: -0.5px; text-decoration: none;}
    .logo span { color: var(--warm); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a { font-size: 14px; font-weight: 500; color: var(--dark); text-decoration: none; opacity: 0.7; transition: opacity 0.2s; }
    .nav-links a:hover, .nav-links a.active { opacity: 1; color: var(--warm); }
    .cart-btn { background: var(--dark); color: var(--cream); border: none; padding: 0.5rem 1.2rem; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.2s; }
    .cart-btn:hover { background: var(--warm); }
    .cart-count { background: var(--warm); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: inline-flex; align-items: center; justify-content: center; margin-left: 4px; font-weight: 700; }

    /* LOGIN CONTAINER */
    .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 2.5rem; background: var(--light); }
    .login-card { background: white; padding: 3rem; border-radius: 24px; box-shadow: 0 20px 40px rgba(139,94,60,0.05); width: 100%; max-width: 450px; text-align: center; }
    .login-title { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700; margin-bottom: 0.5rem; color: var(--dark); }
    .login-sub { font-size: 14px; color: rgba(28,24,20,0.6); margin-bottom: 2rem; }
    
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    .form-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 0.5rem; color: var(--dark); }
    .form-input { width: 100%; padding: 1rem 1.2rem; border: 1px solid rgba(139,94,60,0.2); border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; background: var(--cream); color: var(--dark); outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--warm); }
    
    .submit-btn { background: var(--dark); color: var(--cream); border: none; padding: 1rem; border-radius: 30px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; width: 100%; margin-top: 1rem; }
    .submit-btn:hover { background: var(--warm); transform: translateY(-2px); box-shadow: 0 10px 20px rgba(139,94,60,0.2); }

    /* TOAST */
    .toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--dark); color: var(--cream); padding: 1rem 1.5rem; border-radius: 12px; font-size: 14px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 999; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateY(0); }

    @media (max-width: 600px) {
      .login-card { padding: 2rem; }
    }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<nav class="nav">
  <div style="display: flex; align-items: center;">
    <a href="index.html" class="logo">Knit<span>&amp;Co.</span></a>
  </div>
  <ul class="nav-links" id="navLinks">
    <li><a href="index.html">Shop</a></li>
    <li><a href="index.html">Collections</a></li>
    <li><a href="customer-care.html">Customer Care</a></li>
    <!-- Dynamic link injected here -->
  </ul>
  <button class="cart-btn" onclick="window.location.href='cart.html'">Cart <span class="cart-count" id="cartCount">0</span></button>
</nav>

<div class="login-wrapper">
  <div class="login-card">
    <h1 class="login-title">Welcome Back</h1>
    <p class="login-sub">Log in to access your account or the admin dashboard.</p>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="emailInput" class="form-input" placeholder="admin@knitandco.com" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="passwordInput" class="form-input" placeholder="••••••••" required />
      </div>
      <button type="submit" class="submit-btn">Sign In</button>
    </form>
  </div>
</div>

<script>
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function updateCartCount() {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
    const countEl = document.getElementById('cartCount');
    if (countEl) countEl.textContent = totalQty;
  }

  function renderNav() {
    const role = localStorage.getItem('userRole');
    const navLinks = document.getElementById('navLinks');
    
    // Remove existing dynamic links
    const existingDynamic = document.querySelectorAll('.dynamic-link');
    existingDynamic.forEach(el => el.remove());

    if (role === 'admin') {
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="admin.html">Admin Dashboard</a></li>');
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="#" onclick="logout(event)">Logout</a></li>');
    } else if (role === 'customer') {
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="#">My Account</a></li>');
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="#" onclick="logout(event)">Logout</a></li>');
    } else {
      navLinks.insertAdjacentHTML('beforeend', '<li class="dynamic-link"><a href="login.html" class="active">Login</a></li>');
    }
  }

  function logout(e) {
    if(e) e.preventDefault();
    localStorage.removeItem('userRole');
    showToast('Logged out successfully.');
    renderNav();
  }

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('emailInput').value;
    const password = document.getElementById('passwordInput').value;

    if (email === 'admin@knitandco.com' && password === 'admin') {
      localStorage.setItem('userRole', 'admin');
      showToast('Welcome Admin!');
      setTimeout(() => window.location.href = 'admin.html', 1000);
    } else {
      localStorage.setItem('userRole', 'customer');
      showToast('Welcome back!');
      setTimeout(() => window.location.href = 'index.html', 1000);
    }
  }

  // Init
  updateCartCount();
  renderNav();
</script>

</body>
</html>
